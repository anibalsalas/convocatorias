server:
  port: 8081
  servlet:
    context-path: /api/sisconv

spring:
  datasource:
    url: jdbc:h2:mem:sisconv_test;DB_CLOSE_DELAY=-1;MODE=Oracle;INIT=CREATE SCHEMA IF NOT EXISTS SISCONV
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        default_schema: SISCONV
  h2:
    console:
      enabled: true
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: America/Lima

sisconv:
  jwt:
    secret: test-secret-key-sisconv-acffaa-2025-min-256-bits-for-unit-testing-only
    access-token-expiration: 1800000
    refresh-token-expiration: 86400000
    issuer: SISCONV-ACFFAA-TEST

logging:
  level:
    root: WARN
    pe.gob.acffaa.sisconv: DEBUG